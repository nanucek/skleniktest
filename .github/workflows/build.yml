name: Build ESP32 firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-firmware:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO and esptool
        run: |
          python -m pip install --upgrade pip
          pip install platformio esptool

      - name: Build firmware
        run: |
          pio run

      - name: Merge firmware
        run: |
          mkdir -p docs/firmware

          esptool.py --chip esp32 merge_bin \
            -o docs/firmware/merged-firmware.bin \
            0x1000 .pio/build/esp32doit-devkit-v1/bootloader.bin \
            0x8000 .pio/build/esp32doit-devkit-v1/partitions.bin \
            0xe000 ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin \
            0x10000 .pio/build/esp32doit-devkit-v1/firmware.bin

      - name: Commit firmware
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/firmware/merged-firmware.bin
          git commit -m "Build firmware" || echo "No changes"
          git push
