name: Build ESP32 firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Stáhnout repozitář
        uses: actions/checkout@v4

      - name: Nastavit Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Nainstalovat PlatformIO a esptool
        run: |
          python -m pip install --upgrade pip
          pip install platformio esptool

      - name: Zkompilovat firmware
        run: |
          pio run

      - name: Vyrobit sloučený BIN soubor
        run: |
          mkdir -p web/firmware

          esptool.py --chip esp32 merge_bin \
            -o web/firmware/merged-firmware.bin \
            0x1000 .pio/build/esp32doit-devkit-v1/bootloader.bin \
            0x8000 .pio/build/esp32doit-devkit-v1/partitions.bin \
            0xe000 ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin \
            0x10000 .pio/build/esp32doit-devkit-v1/firmware.bin

      - name: Zapsat změněný firmware zpět do repozitáře
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add web/firmware/merged-firmware.bin
          git commit -m "Automaticky zkompilovaný firmware" || echo "Firmware beze změny"
          git push
